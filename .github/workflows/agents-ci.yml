name: agents-ci

on:
  push:
    branches: [main]
    paths:
      - "pm-interview-prep/**"
      - ".github/workflows/agents-ci.yml"
  pull_request:
    paths:
      - "pm-interview-prep/**"
      - ".github/workflows/agents-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pm-interview-prep/apps/agents
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check src tests
      - name: Tests (mock LLM)
        env:
          LLM_PROVIDER: mock
        run: pytest --cov=agents --cov-report=term-missing
